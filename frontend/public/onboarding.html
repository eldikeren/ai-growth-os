<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elad Digital — Account Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #0c0c14;
  --surface: #13131f;
  --surface2: #1c1c2e;
  --border: #262640;
  --border2: #32324e;
  --accent: #635bff;
  --accent-light: #8b85ff;
  --green: #00d68f;
  --green-dim: rgba(0,214,143,0.12);
  --amber: #ffb547;
  --red: #ff4d6a;
  --text: #e8e8f5;
  --muted: #6b6b90;
  --card: rgba(28,28,46,0.95);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--text);font-family:'Heebo',sans-serif;min-height:100vh;overflow-x:hidden}

/* BG mesh */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(99,91,255,.18) 0,transparent 65%),radial-gradient(ellipse 50% 50% at 90% 90%,rgba(0,214,143,.07) 0,transparent 60%);pointer-events:none;z-index:0}

/* LAYOUT */
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);background:rgba(12,12,20,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.brand{font-size:12px;font-weight:800;letter-spacing:2.5px;color:var(--accent-light)}
.client-pill{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border2);border-radius:100px;padding:5px 14px;font-size:13px;font-weight:500}
.dot{width:8px;height:8px;border-radius:50%}

/* SHELL */
.shell{max-width:680px;margin:0 auto;padding:40px 20px 100px;width:100%}

/* STEP PROGRESS */
.step-bar{display:flex;gap:0;margin-bottom:44px;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.step-item{flex:1;padding:14px 8px;text-align:center;border-right:1px solid var(--border);position:relative;cursor:default;transition:background .2s}
.step-item:last-child{border-right:none}
.step-item.active{background:rgba(99,91,255,.12)}
.step-item.done{background:rgba(0,214,143,.08)}
.step-num{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:3px}
.step-item.active .step-num{color:var(--accent-light)}
.step-item.done .step-num{color:var(--green)}
.step-label{font-size:12px;font-weight:600;color:var(--muted)}
.step-item.active .step-label{color:var(--text)}
.step-item.done .step-label{color:var(--green)}

/* HEADER */
.page-head{text-align:center;margin-bottom:40px;animation:fadeDown .5s ease}
.page-head h1{font-size:32px;font-weight:900;letter-spacing:-.5px;line-height:1.2;margin-bottom:10px}
.page-head p{font-size:15px;color:var(--muted);line-height:1.7;max-width:480px;margin:0 auto}
.highlight{background:linear-gradient(135deg,var(--accent),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* DETECTED BANNER */
.detected-banner{background:rgba(99,91,255,.1);border:1px solid rgba(99,91,255,.3);border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;gap:14px;align-items:flex-start}
.detected-icon{font-size:22px;flex-shrink:0}
.detected-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.detected-tag{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:3px 10px;font-size:11px;font-weight:600;color:var(--accent-light)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;backdrop-filter:blur(8px);animation:fadeUp .4s ease both}
.card+.card{margin-top:16px}

/* CONNECTOR CARD */
.connector{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:12px;transition:border-color .2s,transform .15s;animation:fadeUp .35s ease both}
.connector:hover{border-color:var(--border2);transform:translateY(-1px)}
.connector.connected{border-color:rgba(0,214,143,.35);background:rgba(0,214,143,.04)}
.connector.connecting{border-color:rgba(99,91,255,.4)}
.connector.skipped{opacity:.55}

.conn-head{display:flex;align-items:center;gap:14px;padding:18px 22px;cursor:pointer}
.conn-icon{width:46px;height:46px;border-radius:12px;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.conn-body{flex:1;min-width:0}
.conn-name{font-size:15px;font-weight:700;margin-bottom:2px}
.conn-desc{font-size:13px;color:var(--muted);line-height:1.4}
.conn-sub{font-size:11px;margin-top:4px;font-weight:600}
.conn-sub.green{color:var(--green)}
.conn-sub.amber{color:var(--amber)}
.conn-status{flex-shrink:0;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;border:2px solid var(--border2)}
.st-pending{color:var(--muted)}
.st-connected{background:var(--green-dim);border-color:var(--green);color:var(--green)}
.st-connecting{background:rgba(99,91,255,.15);border-color:var(--accent);color:var(--accent)}
.st-skip{color:var(--muted);font-size:10px}

/* CONN FORM */
.conn-form{display:none;padding:0 22px 22px;border-top:1px solid var(--border)}
.conn-form.open{display:block}

/* OAUTH BTN */
.oauth-btn{display:flex;align-items:center;gap:12px;width:100%;padding:13px 18px;border-radius:10px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;margin-top:16px;border:1px solid;transition:all .2s}
.goog{background:#fff;color:#1f2937;border-color:#e5e7eb}
.goog:hover{background:#f9fafb;box-shadow:0 4px 14px rgba(0,0,0,.4)}
.meta{background:#1877f2;color:#fff;border-color:#1877f2}
.meta:hover{background:#166fe5;box-shadow:0 4px 14px rgba(24,119,242,.3)}
.oauth-logo{width:20px;height:20px;flex-shrink:0}

/* FORM FIELDS */
.field{margin-top:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--accent-light);letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase}
.field input,.field select,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'Heebo',sans-serif;font-size:14px;outline:none;transition:border-color .2s;direction:ltr;text-align:left}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field .help{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5}
.pw-wrap{position:relative}
.pw-eye{position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:10px;font-family:'Heebo',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#4f46e5;transform:translateY(-1px)}
.btn-primary:disabled{background:var(--surface2);color:var(--muted);cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2)}
.btn-ghost:hover{color:var(--text);border-color:var(--text)}
.btn-green{background:var(--green);color:#000}
.btn-green:hover{filter:brightness(1.1)}
.btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}

/* CONNECTED STATE */
.connected-info{display:flex;align-items:center;gap:10px;background:var(--green-dim);border:1px solid rgba(0,214,143,.25);border-radius:8px;padding:11px 14px;margin-top:14px;font-size:13px;font-weight:600;color:var(--green)}

/* DISCOVERY PILLS */
.discovery-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.disc-pill{background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600}
.disc-pill.good{border-color:rgba(0,214,143,.3);color:var(--green)}
.disc-pill.warn{border-color:rgba(255,181,71,.3);color:var(--amber)}
.disc-pill.bad{border-color:rgba(255,77,106,.3);color:var(--red)}

/* SECURITY NOTE */
.sec-note{display:flex;align-items:flex-start;gap:10px;background:rgba(99,91,255,.07);border:1px solid rgba(99,91,255,.2);border-radius:8px;padding:12px 14px;margin-top:14px;font-size:12px;color:var(--muted);line-height:1.5}

/* ASSET SELECTOR */
.asset-list{margin-top:14px;display:grid;gap:8px}
.asset-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border2);border-radius:8px;cursor:pointer;transition:border-color .2s}
.asset-item:hover{border-color:var(--accent)}
.asset-item.selected{border-color:var(--green);background:var(--green-dim)}
.asset-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700}
.asset-item.selected .asset-check{background:var(--green);border-color:var(--green);color:#000}

/* BUSINESS TRUTH FORM */
.truth-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tag-input-wrap{display:flex;gap:6px;margin-top:6px}
.tag-input{flex:1;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'Heebo',sans-serif;font-size:13px;outline:none;direction:rtl}
.tag-input:focus{border-color:var(--accent)}
.tags-container{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tag{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:500}
.tag-rm{cursor:pointer;color:var(--muted);font-size:14px}
.tag-rm:hover{color:var(--red)}

/* LAUNCH SCREEN */
.launch-screen{text-align:center;padding:20px}
.launch-icon{font-size:56px;margin-bottom:20px}
.launch-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:28px 0;text-align:right}
.launch-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;gap:10px;align-items:flex-start}
.launch-item .li-icon{font-size:18px;flex-shrink:0}
.launch-item .li-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px}
.launch-item .li-sub{font-size:11px;color:var(--muted)}

/* COMPLETE SCREEN */
.complete{text-align:center;padding:40px 20px;animation:scaleIn .5s ease}
.complete-ring{width:90px;height:90px;border-radius:50%;background:var(--green-dim);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 24px}

/* OVERALL PROGRESS */
.overall-prog{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:28px;display:flex;align-items:center;gap:14px}
.prog-bar{flex:1;height:5px;background:var(--border2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .4s ease}
.prog-text{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}

/* SPINNER */
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}

/* LOADING SCREEN */
#loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
#loading-screen .spin{width:32px;height:32px;border-width:3px}

/* ANIM */
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.conn:nth-child(2){animation-delay:.08s}
.conn:nth-child(3){animation-delay:.12s}
.conn:nth-child(4){animation-delay:.16s}
.conn:nth-child(5){animation-delay:.2s}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c1c2e;color:var(--text);border:1px solid var(--border2);padding:11px 22px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:opacity .25s;z-index:9999;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:520px){.step-label{display:none}.truth-grid{grid-template-columns:1fr}.launch-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <!-- TOP BAR -->
  <nav class="topbar">
    <div class="brand">ELAD DIGITAL</div>
    <div id="client-pill" class="client-pill" style="display:none">
      <div class="dot" style="background:var(--green)"></div>
      <span id="client-pill-name"></span>
    </div>
  </nav>

  <!-- MAIN -->
  <div class="shell" id="main">
    <div id="loading-screen">
      <div class="spin"></div>
      <div style="color:var(--muted);font-size:14px">טוען...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3001/api' : '/api';
const rawToken = window.location.pathname.split('/onboarding/')[1]?.split('/')[0]?.split('?')[0];
let S = null; // session state

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  const justConnected = params.get('connected');
  const providers = params.get('providers');

  if (!rawToken) { showError('קישור לא תקין'); return; }
  try {
    const res = await fetch(`${API}/onboarding/${rawToken}`);
    const data = await res.json();
    if (data.error) { showError(data.error); return; }
    if (data.status === 'completed' && !data.step_finalized) { showError('ההגדרה כבר הושלמה'); return; }
    S = data;
    document.getElementById('client-pill').style.display = 'flex';
    document.getElementById('client-pill-name').textContent = S.client_name || '';
    if (justConnected) toast(`✓ ${justConnected === 'google' ? 'Google' : 'Meta'} חובר בהצלחה!`);
    render();
  } catch (e) { showError('שגיאה בטעינה — אנא רעננו את הדף'); }
}

// ── RENDER ROUTER ─────────────────────────────────────────────
function render() {
  if (!S.step_welcome_done) { renderStep1(); return; }
  if (!S.step_business_truth_done && S.step_connectors_done) { renderStep3(); return; }
  if (S.step_finalized) { renderComplete(); return; }
  renderStep2();
}

// ── STEP 1: WELCOME ───────────────────────────────────────────
function renderStep1() {
  const isHe = S.language === 'he';
  const d = S.pre_detected || {};
  let detectedHtml = '';
  if (d.website_reachable || d.platform || d.has_ga4) {
    const tags = [];
    if (d.website_reachable) tags.push(`<span class="detected-tag">🌐 ${S.client_domain}</span>`);
    if (d.platform) tags.push(`<span class="detected-tag">⚙️ ${d.platform}</span>`);
    if (d.has_ga4) tags.push(`<span class="detected-tag">📊 Google Analytics</span>`);
    if (d.has_gtm) tags.push(`<span class="detected-tag">🏷 GTM</span>`);
    if (d.has_pixel) tags.push(`<span class="detected-tag">📘 Meta Pixel</span>`);
    if (d.pages_in_sitemap) tags.push(`<span class="detected-tag">📄 ${d.pages_in_sitemap} דפים</span>`);
    detectedHtml = `
      <div class="detected-banner">
        <div class="detected-icon">🔍</div>
        <div>
          <div style="font-size:13px;font-weight:700;margin-bottom:6px">מה שמצאנו מראש</div>
          <div class="detected-list">${tags.join('')}</div>
        </div>
      </div>`;
  }

  setMain(`
    <div style="animation:fadeDown .5s ease">
      ${renderStepBar(1)}
      <div class="page-head">
        <div style="font-size:40px;margin-bottom:16px">👋</div>
        <h1>${isHe ? `ברוכים הבאים,<br><span class="highlight">${S.client_name}</span>` : `Welcome,<br><span class="highlight">${S.client_name}</span>`}</h1>
        <p style="margin-top:14px">${S.custom_message || (isHe ? 'כדי שנוכל להתחיל לעבוד עבורכם, נחבר את הכלים הדיגיטליים שלכם. כל חיבור לוקח פחות מ-30 שניות.' : 'To start working on your behalf, we\'ll connect your digital tools. Each connection takes under 30 seconds.')}</p>
      </div>
      ${detectedHtml}
      <div class="card">
        <div style="font-size:15px;font-weight:700;margin-bottom:18px">${isHe ? 'מה תקבלו מהמערכת' : 'What you\'ll get'}</div>
        ${[
          ['🔍', isHe ? 'ניטור SEO יומי' : 'Daily SEO monitoring', isHe ? 'מעקב אחר דירוגים, קליקים, והזדמנויות' : 'Track rankings, clicks, and opportunities'],
          ['💰', isHe ? 'ניהול מודעות' : 'Ads management', isHe ? 'אופטימיזציה אוטומטית של קמפיינים' : 'Automatic campaign optimization'],
          ['⭐', isHe ? 'ניהול ביקורות' : 'Review management', isHe ? 'תגובות לביקורות ושיפור הנוכחות המקומית' : 'Response to reviews and local presence'],
          ['📊', isHe ? 'דוחות שבועיים' : 'Weekly reports', isHe ? 'דוחות מקצועיים ישירות למייל שלכם' : 'Professional reports to your inbox'],
        ].map(([icon, title, desc]) => `
          <div style="display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border)">
            <div style="font-size:22px;width:36px;flex-shrink:0">${icon}</div>
            <div><div style="font-size:14px;font-weight:700;margin-bottom:2px">${title}</div><div style="font-size:13px;color:var(--muted)">${desc}</div></div>
          </div>`).join('')}
        <div class="btn-row" style="margin-top:24px">
          <button class="btn btn-primary" onclick="doneWelcome()">
            ${isHe ? 'נתחיל →' : 'Let\'s Start →'}
          </button>
          <button class="btn btn-ghost" onclick="showError('זה לא העסק שלי')">
            ${isHe ? 'זה לא העסק שלי' : 'This is not my business'}
          </button>
        </div>
      </div>
    </div>`);
}

async function doneWelcome() {
  await fetch(`${API}/onboarding/${rawToken}/welcome-done`, { method: 'POST', headers: { 'Content-Type': 'application/json' } });
  S.step_welcome_done = true;
  renderStep2();
}

// ── STEP 2: CONNECTORS ────────────────────────────────────────
function renderStep2() {
  const isHe = S.language === 'he';
  const intg = S.integrations || {};
  const completed = S.completed_connectors || [];
  const skipped = S.skipped_connectors || [];

  // Build connector list based on requested_connectors or smart defaults
  const CONNECTORS = [
    { id: 'website', icon: '🌐', name: isHe ? 'אתר האינטרנט' : 'Website', name_en: 'Website',
      desc: isHe ? 'כתובת האתר שלכם לניטור וביקורת טכנית' : 'Your website URL for monitoring and auditing',
      type: 'website' },
    { id: 'google_search_console', icon: '🔍', name: isHe ? 'Google Search Console' : 'Google Search Console',
      desc: isHe ? 'מעקב אחר דירוגים, קליקים ואינדוקס' : 'Track rankings, clicks and indexing',
      type: 'oauth_google', sub: 'search_console' },
    { id: 'google_ads', icon: '💰', name: isHe ? 'Google Ads' : 'Google Ads',
      desc: isHe ? 'ניהול קמפיינים והמרות' : 'Campaign and conversion management',
      type: 'oauth_google', sub: 'ads' },
    { id: 'google_analytics', icon: '📊', name: isHe ? 'Google Analytics 4' : 'Google Analytics 4',
      desc: isHe ? 'ניתוח תנועה ומשפך המרות' : 'Traffic and conversion funnel analysis',
      type: 'oauth_google', sub: 'analytics', optional: true },
    { id: 'google_business_profile', icon: '📍', name: isHe ? 'Google Business Profile' : 'Google Business Profile',
      desc: isHe ? 'ניהול ביקורות ונוכחות מקומית' : 'Manage reviews and local presence',
      type: 'oauth_google', sub: 'business_profile' },
    { id: 'facebook', icon: '📘', name: isHe ? 'דף פייסבוק עסקי' : 'Facebook Business Page',
      desc: isHe ? 'פרסום תוכן וניטור — דף עסקי בלבד' : 'Content publishing — Business Page only',
      type: 'oauth_meta', sub: 'facebook' },
    { id: 'instagram', icon: '📸', name: isHe ? 'Instagram ביזנס' : 'Instagram Business',
      desc: isHe ? 'מחובר דרך פייסבוק — פרופיל עסקי בלבד' : 'Connected via Facebook — Business Profile only',
      type: 'oauth_meta', sub: 'instagram', note: isHe ? 'מחובר ב-Facebook' : 'Connects via Facebook' },
    { id: 'hosting', icon: '🖥', name: isHe ? 'גישה לאחסון' : 'Hosting Access',
      desc: isHe ? 'גישה לבצע שינויים טכניים באתר' : 'Access to make technical SEO improvements',
      type: 'credentials', optional: true },
    // ── Website Access Connectors (Step 2B) ──
    { id: 'git_repo', icon: '📁', name: isHe ? 'Git Repository' : 'Git Repository',
      desc: isHe ? 'חיבור לריפו — PR, branch, deploy אוטומטי' : 'Connect repo for automated PR, branch & deploy',
      type: 'git', optional: true },
    { id: 'cms_access', icon: '🖥', name: isHe ? 'גישת CMS' : 'CMS Access',
      desc: isHe ? 'עריכת דפים, מטא, תוכן דרך API או אדמין' : 'Edit pages, meta, content via API or admin panel',
      type: 'cms', optional: true },
    { id: 'server_access', icon: '🔒', name: isHe ? 'גישת שרת' : 'Server Access',
      desc: isHe ? 'SSH/SFTP — רק אם אין גישת Git או CMS' : 'SSH/SFTP — only if no Git or CMS access available',
      type: 'server', optional: true },
  ];

  // Filter based on requested_connectors if set
  const requested = S.requested_connectors?.length > 0 ? S.requested_connectors : null;
  const connectors = requested
    ? CONNECTORS.filter(c => requested.some(r => c.id.includes(r) || r.includes(c.id)))
    : CONNECTORS;

  const total = connectors.length;
  const done = connectors.filter(c => completed.some(cc => cc.includes(c.id)) || intg[c.sub || c.id]?.status === 'connected').length;
  const pct = Math.round((done / total) * 100);
  const allDone = done >= connectors.filter(c => !c.optional).length;

  let connsHtml = connectors.map((c, i) => {
    const isConnected = completed.some(cc => cc.includes(c.id)) || intg[c.sub || c.id]?.status === 'connected';
    const isSkipped = skipped.some(s => s.includes(c.id));
    const discovery = intg[c.sub || c.id]?.discovery_summary;
    const discLabel = discovery?.label || discovery?.note;
    return `
      <div class="connector ${isConnected ? 'connected' : isSkipped ? 'skipped' : ''}" id="conn-${c.id}" style="animation-delay:${i * 0.06}s">
        <div class="conn-head" onclick="toggleConn('${c.id}')">
          <div class="conn-icon">${c.icon}</div>
          <div class="conn-body">
            <div class="conn-name">${c.name}${c.optional ? `<span style="font-size:10px;color:var(--muted);margin-right:6px">(${isHe ? 'אופציונלי' : 'optional'})</span>` : ''}</div>
            <div class="conn-desc">${c.desc}</div>
            ${isConnected && discLabel ? `<div class="conn-sub green">✓ ${discLabel}</div>` : ''}
            ${isSkipped ? `<div class="conn-sub amber">— ${isHe ? 'דולג' : 'Skipped'}</div>` : ''}
            ${c.note ? `<div class="conn-sub" style="color:var(--muted)">${c.note}</div>` : ''}
          </div>
          <div class="conn-status ${isConnected ? 'st-connected' : 'st-pending'}" id="status-${c.id}">
            ${isConnected ? '✓' : '›'}
          </div>
        </div>
        <div class="conn-form" id="form-${c.id}">
          ${renderConnForm(c, isConnected, discovery, isHe)}
        </div>
      </div>`;
  }).join('');

  setMain(`
    ${renderStepBar(2)}
    <div class="page-head" style="animation:fadeDown .4s ease">
      <h1>${isHe ? 'חיבור הכלים הדיגיטליים' : 'Connect Your Digital Tools'}</h1>
      <p>${isHe ? 'חברו את הכלים שלכם. כל חיבור מתחיל לעבוד מיד.' : 'Connect your tools. Each one starts working immediately.'}</p>
    </div>
    <div class="overall-prog">
      <div class="prog-bar"><div class="prog-fill" id="main-prog-fill" style="width:${pct}%"></div></div>
      <div class="prog-text" id="main-prog-text">${done}/${total} ${isHe ? 'חוברו' : 'connected'}</div>
    </div>
    ${connsHtml}
    ${allDone ? `
      <div class="card" style="text-align:center;margin-top:24px;background:rgba(0,214,143,.06);border-color:rgba(0,214,143,.25)">
        <div style="font-size:28px;margin-bottom:10px">🎉</div>
        <div style="font-size:16px;font-weight:700;color:var(--green);margin-bottom:8px">${isHe ? 'מצוין! ממשיכים להגדרה האחרונה' : 'Great! Continue to final setup'}</div>
        <button class="btn btn-green" onclick="goToTruth()">${isHe ? 'המשיכו ←' : 'Continue →'}</button>
      </div>` : `
      <div style="margin-top:16px;text-align:center">
        <button class="btn btn-ghost" onclick="goToTruth()" style="font-size:13px">${isHe ? 'דלגו לשלב הבא ←' : 'Skip to next step →'}</button>
      </div>`}
  `);
}

function renderDiscoveryPills(d, isHe) {
  if (!d) return '';
  const pills = [];
  if (d.pages_in_sitemap) pills.push([`📄 ${d.pages_in_sitemap} ${isHe ? 'דפים' : 'pages'}`, 'good']);
  if (d.platform) pills.push([`⚙️ ${d.platform}`, 'good']);
  if (d.has_local_business_schema) pills.push([`✓ LocalBusiness Schema`, 'good']);
  if (!d.has_local_business_schema && d.reachable) pills.push([`✗ ${isHe ? 'חסר LocalBusiness Schema' : 'Missing Schema'}`, 'bad']);
  if (d.has_ga4) pills.push(['✓ GA4', 'good']);
  if (d.keywords_found) pills.push([`🔍 ${d.keywords_found} ${isHe ? 'מילות מפתח' : 'keywords'}`, 'good']);
  if (d.reviews_found) pills.push([`⭐ ${d.reviews_found} ${isHe ? 'ביקורות' : 'reviews'}`, 'good']);
  if (!pills.length) return '';
  return `<div class="discovery-grid">${pills.map(([t, cls]) => `<span class="disc-pill ${cls}">${t}</span>`).join('')}</div>`;
}

        </div>
        <div class="field">
          <label>${isHe ? 'שפת הדוחות' : 'Report Language'}</label>
          <select id="report-lang" style="background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);width:100%;font-family:Heebo,sans-serif;font-size:14px;outline:none">
            <option value="he" ${S.language==='he'?'selected':''}>עברית</option>
            <option value="en" ${S.language==='en'?'selected':''}>English</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>${isHe ? 'שירותים עיקריים' : 'Primary Services'}</label>
        <textarea id="primary-services" rows="2" style="background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);width:100%;font-family:Heebo,sans-serif;font-size:14px;outline:none;resize:vertical;direction:rtl" placeholder="${isHe ? 'גירושין, ירושה, משמורת ילדים...' : 'Describe your main services...'}">${truth.primary_services?.join(', ') || ''}</textarea>
      </div>
      ${renderTagField('target-audiences', isHe ? 'קהלי יעד' : 'Target Audiences', truth.target_audiences || [], isHe ? 'e.g. זוגות המתגרשים בתל אביב' : 'e.g. divorcing couples in Tel Aviv', isHe)}
      ${renderTagField('forbidden-audiences', isHe ? 'קהלים לא רצויים' : 'Forbidden Audiences', truth.forbidden_audiences || [], isHe ? 'e.g. עורכי דין, סטודנטים' : 'e.g. lawyers, students', isHe)}
      <div class="field">
        <label>${isHe ? 'מה מייחד אתכם?' : 'What makes you different?'}</label>
        <textarea id="differentiators" rows="2" style="background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);width:100%;font-family:Heebo,sans-serif;font-size:14px;outline:none;resize:vertical;direction:rtl" placeholder="${isHe ? '218 ביקורות, ניסיון 20+ שנה, התמחות בגירושין מורכבים...' : 'Your unique advantages...'}">${truth.differentiators || ''}</textarea>
      </div>
      <div class="truth-grid">
        <div class="field">
          <label>${isHe ? 'עיר ראשית' : 'Primary City'}</label>
          <input type="text" id="primary-city" placeholder="${isHe ? 'תל אביב' : 'Tel Aviv'}" value="${truth.primary_city || ''}" style="direction:rtl">
        </div>
        <div class="field">
          <label>${isHe ? 'אימייל לדוחות' : 'Report Email'}</label>
          <input type="email" id="report-email" placeholder="you@example.com" value="${truth.report_recipients?.[0] || ''}" style="direction:ltr;text-align:left">
        </div>
      </div>
      <div class="field">
        <label>${isHe ? 'הערות ציות / מגבלות פרסום' : 'Compliance / Advertising Restrictions'}</label>
        <textarea id="compliance" rows="2" style="background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:10px 14px;color:var(--text);width:100%;font-family:Heebo,sans-serif;font-size:14px;outline:none;resize:vertical;direction:rtl" placeholder="${isHe ? 'כללי לשכת עורכי הדין — אין הבטחת תוצאות...' : 'e.g. Bar Association rules — no guaranteed outcomes...'}">${truth.compliance_notes || ''}</textarea>
      </div>
      <div class="btn-row" style="margin-top:24px">
        <button class="btn btn-primary" id="btn-truth" onclick="saveTruth()">${isHe ? 'שמרו והמשיכו ←' : 'Save & Continue →'}</button>
      </div>
    </div>
  `);
}

function renderTagField(id, label, existing, placeholder, isHe) {
  return `
    <div class="field" id="tf-${id}">
      <label>${label}</label>
      <div class="tag-input-wrap">
        <input class="tag-input" id="${id}-input" placeholder="${placeholder}" onkeydown="if(event.key==='Enter'){addTag('${id}');event.preventDefault()}">
        <button class="btn btn-ghost" style="padding:7px 14px;font-size:12px" onclick="addTag('${id}')">${isHe ? 'הוסף' : 'Add'}</button>
      </div>
      <div class="tags-container" id="${id}-tags">
        ${existing.map(t => `<span class="tag">${t}<span class="tag-rm" onclick="removeTag('${id}','${t}')">×</span></span>`).join('')}
      </div>
    </div>`;
}

// ── STEP 4: LAUNCH ────────────────────────────────────────────
function renderStep4() {
  const isHe = S.language === 'he';
  const intg = S.integrations || {};
  const connected = Object.entries(intg).filter(([k, v]) => v.status === 'connected');
  const missing = Object.entries(intg).filter(([k, v]) => v.status !== 'connected' && v.status !== 'skipped');

  setMain(`
    ${renderStepBar(4)}
    <div class="page-head" style="animation:fadeDown .4s ease">
      <h1>${isHe ? '🚀 הכל מוכן' : '🚀 All Set'}</h1>
      <p>${isHe ? 'הנה סיכום מה שהגדרתם. לחצו על "הפעלה" כדי להתחיל.' : 'Here\'s a summary of what you\'ve configured. Click Launch to begin.'}</p>
    </div>
    <div class="card">
      <div style="font-size:14px;font-weight:700;margin-bottom:16px;color:var(--green)">✓ ${isHe ? 'חוברו' : 'Connected'}</div>
      <div class="launch-grid">
        ${connected.map(([k, v]) => `
          <div class="launch-item">
            <div class="li-icon">✓</div>
            <div><div class="li-title">${k}</div><div class="li-sub">${v.discovery_summary?.label || v.external_account_email || ''}</div></div>
          </div>`).join('')}
        ${connected.length === 0 ? `<div style="color:var(--muted);font-size:13px">${isHe ? 'לא חובר כלום — ניתן להמשיך ולחבר בהמשך' : 'Nothing connected yet — you can connect later'}</div>` : ''}
      </div>
      ${missing.length > 0 ? `
        <div style="font-size:14px;font-weight:700;margin:20px 0 12px;color:var(--amber)">⚠ ${isHe ? 'לא חובר' : 'Not connected'}</div>
        <div style="font-size:13px;color:var(--muted)">${missing.map(([k]) => k).join(' · ')}</div>
        <div style="font-size:12px;color:var(--muted);margin-top:6px">${isHe ? 'ניתן לחבר בכל עת דרך לוח הבקרה' : 'Can be connected anytime from the dashboard'}</div>` : ''}
      <div style="margin-top:28px;padding:20px;background:rgba(99,91,255,.08);border:1px solid rgba(99,91,255,.2);border-radius:12px;text-align:center">
        <div style="font-size:14px;font-weight:700;margin-bottom:6px">${isHe ? 'מה קורה כשלוחצים הפעלה:' : 'What happens when you click Launch:'}</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.7">
          ${isHe ? '• ייבוא ראשון של נתונים מכל הכלים שחוברו<br>• יצירת קו בסיס (baselines) לכל המדדים<br>• הסוכנים מתחילים לעבוד אוטומטית<br>• הדוח הראשון ישלח תוך 24 שעות' : '• First data import from all connected tools<br>• Baselines created for all metrics<br>• Agents start working automatically<br>• First report sent within 24 hours'}
        </div>
      </div>
      <div class="btn-row" style="margin-top:24px;justify-content:center">
        <button class="btn btn-green" style="font-size:16px;padding:16px 40px" id="btn-launch" onclick="launch()">
          🚀 ${isHe ? 'הפעלה!' : 'Launch!'}
        </button>
      </div>
    </div>
  `);
}

function renderComplete() {
  const isHe = S.language === 'he';
  setMain(`
    <div class="complete">
      <div class="complete-ring">🎉</div>
      <h1 style="font-size:28px;font-weight:900;margin-bottom:12px">${isHe ? 'ההגדרה הושלמה!' : 'Setup Complete!'}</h1>
      <p style="font-size:15px;color:var(--muted);max-width:400px;margin:0 auto;line-height:1.7">
        ${isHe ? 'הסוכנים שלנו כבר עובדים. תקבלו עדכון בקרוב עם הממצאים הראשונים.' : 'Our agents are already working. You\'ll receive an update soon with the first findings.'}
      </p>
    </div>
  `);
}

// ── STEP BAR ──────────────────────────────────────────────────
function renderStepBar(current) {
  const isHe = S?.language === 'he';
  const steps = isHe
    ? ['ברוכים הבאים', 'חיבורים', 'פרטי עסק', 'הפעלה']
    : ['Welcome', 'Connections', 'Business Info', 'Launch'];
  return `<div class="step-bar">${steps.map((s, i) => {
    const n = i + 1;
    const cls = n < current ? 'done' : n === current ? 'active' : '';
    return `<div class="step-item ${cls}"><span class="step-num">${n < current ? '✓' : n}</span><span class="step-label">${s}</span></div>`;
  }).join('')}</div>`;
}

// ── ACTIONS ───────────────────────────────────────────────────
function toggleConn(id) {
  const form = document.getElementById(`form-${id}`);
  const isOpen = form.classList.contains('open');
  document.querySelectorAll('.conn-form').forEach(f => f.classList.remove('open'));
  if (!isOpen) form.classList.add('open');
}

async function startGoogleOAuth(subProviders) {
  try {
    const res = await post('/oauth/google/start', { token: rawToken, subProviders });
    if (res.auth_url) window.location.href = res.auth_url;
  } catch (e) { toast('שגיאה: ' + e.message, true); }
}

async function startMetaOAuth() {
  try {
    const res = await post('/oauth/meta/start', { token: rawToken });
    if (res.auth_url) window.location.href = res.auth_url;
  } catch (e) { toast('שגיאה: ' + e.message, true); }
}

async function connectWebsite() {
  const url = document.getElementById('website-url')?.value?.trim();
  if (!url) { toast('אנא הזינו כתובת URL', true); return; }
  const btn = document.getElementById('btn-website-text');
  if (btn) btn.innerHTML = '<span class="spin"></span>';
  try {
    const result = await post('/onboarding/connect-website', { token: rawToken, websiteUrl: url });
    await refresh();
  } catch (e) { toast(e.message, true); }
}

async function submitCreds(connId) {
  const provider = document.getElementById('cred-provider')?.value;
  const loginUrl = document.getElementById('cred-url')?.value?.trim();
  const username = document.getElementById('cred-user')?.value?.trim();
  const password = document.getElementById('cred-pass')?.value;
  if (!username || !password) { toast(S.language === 'he' ? 'אנא מלאו את כל השדות' : 'Please fill all fields', true); return; }
  try {
    await post('/setup/' + rawToken + '/submit', { connector_slug: connId, type: 'credentials', data: { provider, login_url: loginUrl, username, password } });
    await refresh();
  } catch (e) { toast(e.message, true); }
}

async function submitGit() {
  const provider = document.getElementById('git-provider')?.value;
  const repoUrl = document.getElementById('git-repo-url')?.value?.trim();
  const prodBranch = document.getElementById('git-prod-branch')?.value?.trim() || 'main';
  const stagingBranch = document.getElementById('git-staging-branch')?.value?.trim();
  const pat = document.getElementById('git-pat')?.value;
  if (!repoUrl) { toast(S.language === 'he' ? 'אנא הזינו כתובת ריפו' : 'Please enter repo URL', true); return; }
  try {
    await post('/setup/' + rawToken + '/submit', { connector_slug: 'git_repo', type: 'credentials', data: { provider, repo_url: repoUrl, production_branch: prodBranch, staging_branch: stagingBranch, git_token: pat }, meta: { provider, repo_url: repoUrl } });
    document.getElementById('git-pat').value = '';
    await refresh();
  } catch (e) { toast(e.message, true); }
}

async function submitCms() {
  const cmsType = document.getElementById('cms-type')?.value;
  const adminUrl = document.getElementById('cms-admin-url')?.value?.trim();
  const username = document.getElementById('cms-user')?.value?.trim();
  const email = document.getElementById('cms-email-input')?.value?.trim();
  const apiToken = document.getElementById('cms-api-token-input')?.value;
  if (!cmsType) { toast(S.language === 'he' ? 'אנא בחרו סוג CMS' : 'Please select CMS type', true); return; }
  try {
    await post('/setup/' + rawToken + '/submit', { connector_slug: 'cms_access', type: 'credentials', data: { cms_type: cmsType, admin_url: adminUrl, username, access_email: email, api_token: apiToken }, meta: { cms_type: cmsType, admin_url: adminUrl } });
    document.getElementById('cms-api-token-input').value = '';
    await refresh();
  } catch (e) { toast(e.message, true); }
}

async function submitServer() {
  const accessType = document.getElementById('srv-type')?.value;
  const host = document.getElementById('srv-host')?.value?.trim();
  const port = document.getElementById('srv-port')?.value || '22';
  const username = document.getElementById('srv-user')?.value?.trim();
  const password = document.getElementById('srv-pass')?.value;
  const rootPath = document.getElementById('srv-root')?.value?.trim();
  if (!host || !username) { toast(S.language === 'he' ? 'אנא מלאו שרת ושם משתמש' : 'Please enter host and username', true); return; }
  try {
    await post('/setup/' + rawToken + '/submit', { connector_slug: 'server_access', type: 'credentials', data: { access_type: accessType, host, port, username, password, site_root_path: rootPath }, meta: { access_type: accessType, host } });
    document.getElementById('srv-pass').value = '';
    await refresh();
  } catch (e) { toast(e.message, true); }
}

async function skipConn(id) {
  try {
    await post('/onboarding/skip-connector', { token: rawToken, connector: id });
    await refresh();
  } catch (e) { toast(e.message, true); }
}

async function selectAsset(assetId, connId) {
  try {
    await post('/onboarding/select-asset', { token: rawToken, assetId });
    await refresh();
  } catch (e) { toast(e.message, true); }
}

function goToTruth() {
  S.step_connectors_done = true;
  renderStep3();
}

const tagData = {};
function addTag(fieldId) {
  const input = document.getElementById(fieldId + '-input');
  const val = input?.value?.trim();
  if (!val) return;
  if (!tagData[fieldId]) tagData[fieldId] = [];
  if (!tagData[fieldId].includes(val)) {
    tagData[fieldId].push(val);
    const container = document.getElementById(fieldId + '-tags');
    const span = document.createElement('span');
    span.className = 'tag';
    span.dataset.val = val;
    span.innerHTML = `${val}<span class="tag-rm" onclick="removeTag('${fieldId}','${val}')">×</span>`;
    container.appendChild(span);
  }
  input.value = '';
}

function removeTag(fieldId, val) {
  if (tagData[fieldId]) tagData[fieldId] = tagData[fieldId].filter(t => t !== val);
  const container = document.getElementById(fieldId + '-tags');
  container?.querySelectorAll('.tag').forEach(el => { if (el.dataset.val === val) el.remove(); });
}

function getTagValues(fieldId, existing) {
  const container = document.getElementById(fieldId + '-tags');
  const tags = Array.from(container?.querySelectorAll('.tag') || []).map(el => el.dataset.val || el.textContent.replace('×', '').trim());
  return tags.length > 0 ? tags : (existing || []);
}

async function saveTruth() {
  const btn = document.getElementById('btn-truth');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>'; }
  const services = document.getElementById('primary-services')?.value.split(',').map(s => s.trim()).filter(Boolean);
  try {
    await post('/onboarding/save-business-truth', {
      token: rawToken,
      business_type: document.getElementById('biz-type')?.value,
      primary_services: services,
      target_audiences: getTagValues('target-audiences'),
      forbidden_audiences: getTagValues('forbidden-audiences'),
      differentiators: document.getElementById('differentiators')?.value,
      primary_city: document.getElementById('primary-city')?.value,
      report_language: document.getElementById('report-lang')?.value || S.language,
      report_recipients: [document.getElementById('report-email')?.value].filter(Boolean),
      compliance_notes: document.getElementById('compliance')?.value,
      tone: 'professional'
    });
    S.step_business_truth_done = true;
    renderStep4();
  } catch (e) { toast(e.message, true); if (btn) { btn.disabled = false; btn.innerHTML = S.language === 'he' ? 'שמרו והמשיכו ←' : 'Save & Continue →'; } }
}

async function launch() {
  const btn = document.getElementById('btn-launch');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span> ' + (S.language === 'he' ? 'מפעיל...' : 'Launching...'); }
  try {
    const result = await post('/onboarding/finalize', { token: rawToken });
    S.step_finalized = true;
    renderComplete();
  } catch (e) { toast(e.message, true); if (btn) { btn.disabled = false; btn.innerHTML = '🚀 ' + (S.language === 'he' ? 'הפעלה!' : 'Launch!'); } }
}

// ── UTILS ─────────────────────────────────────────────────────
async function post(path, body) {
  const res = await fetch(`${API}${path}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Request failed');
  return data;
}

async function refresh() {
  try {
    const res = await fetch(`${API}/onboarding/${rawToken}`);
    const data = await res.json();
    if (data.valid !== false) S = data;
    render();
  } catch (e) { console.error(e); }
}

function setMain(html) {
  document.getElementById('main').innerHTML = `<div class="shell">${html}</div>`;
}

function showError(msg) {
  document.getElementById('main').innerHTML = `
    <div style="text-align:center;padding:80px 20px;animation:fadeDown .5s ease">
      <div style="font-size:44px;margin-bottom:20px">⚠️</div>
      <h2 style="font-size:20px;margin-bottom:12px;color:var(--red)">${msg}</h2>
      <p style="color:var(--muted);font-size:14px">לבירורים, פנו למנהל החשבון שלכם.</p>
    </div>`;
}

let toastTimer;
function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = (isError ? '⚠ ' : '✓ ') + msg;
  el.style.borderColor = isError ? 'rgba(255,77,106,.3)' : 'rgba(0,214,143,.3)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html>
